# wrangler.toml — Cloudflare Pages 배포 설정
#
# Cloudflare Pages 가 어떤 폴더를 정적 사이트로 서빙할지 지정한다.
# public/ 안의 index.html / styles.css / app.js 만 배포되고,
# server.js·load-test.js 같은 로컬 도구는 배포되지 않는다.
#
# 사용 예:
#   npx wrangler pages deploy            # 로컬에서 직접 배포
#   (또는) Cloudflare 대시보드에서 GitHub 저장소를 연결해 자동 배포

name = "qak6"                       # Pages 프로젝트명 → qak6.pages.dev
compatibility_date = "2024-01-01"
pages_build_output_dir = "public"   # 이 폴더가 사이트 루트로 서빙됨
